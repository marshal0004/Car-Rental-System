<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <g transform="translate(80, 70)">
    <!-- Car body -->
    <rect x="20" y="80" width="200" height="60" rx="14" fill="#0369a1"/>
    <path d="M 50 80 Q 60 30, 120 30 L 170 30 Q 200 30, 210 80 Z" fill="#0284c7"/>
    <!-- Windows -->
    <path d="M 65 75 Q 72 42, 115 42 L 165 42 Q 188 42, 198 75 Z" fill="#bfdbfe" opacity="0.7"/>
    <!-- Wheels -->
    <circle cx="70" cy="140" r="22" fill="#0f172a"/>
    <circle cx="70" cy="140" r="9" fill="#94a3b8"/>
    <circle cx="180" cy="140" r="22" fill="#0f172a"/>
    <circle cx="180" cy="140" r="9" fill="#94a3b8"/>
    <!-- Headlight -->
    <circle cx="215" cy="105" r="6" fill="#fbbf24"/>
  </g>
  <text x="200" y="240" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#0c4a6e" text-anchor="middle">ZoomWheels</text>
  <text x="200" y="262" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#075985" text-anchor="middle">Image coming soon</text>
</svg>
