[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
addopts = -v --tb=short --strict-markers
markers =
    unit: unit tests for pure functions (no I/O)
    integration: integration tests across modules
    functional: functional system tests (API contract / user flows)
    nonfunctional: non-functional tests (performance, security, reliability)
    slow: tests that take >1s
