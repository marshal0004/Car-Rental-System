<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0369a1"/>
      <stop offset="60%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#075985"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="950" cy="160" r="70" fill="#fbbf24" opacity="0.85"/>
  <!-- Distant mountains -->
  <path d="M 0 460 L 200 320 L 380 460 L 540 280 L 720 460 L 900 340 L 1100 460 L 1200 460 L 1200 600 L 0 600 Z" fill="#075985" opacity="0.6"/>
  <!-- Road -->
  <rect y="500" width="1200" height="100" fill="url(#road)"/>
  <line x1="0" y1="550" x2="1200" y2="550" stroke="#fbbf24" stroke-width="3" stroke-dasharray="40 30"/>
  <!-- Car silhouette -->
  <g transform="translate(420, 350)">
    <rect x="20" y="80" width="340" height="80" rx="18" fill="#fbbf24"/>
    <path d="M 70 80 Q 90 10, 200 10 L 260 10 Q 320 10, 340 80 Z" fill="#f59e0b"/>
    <path d="M 90 75 Q 105 30, 195 30 L 255 30 Q 295 30, 310 75 Z" fill="#dbeafe" opacity="0.7"/>
    <circle cx="100" cy="160" r="32" fill="#0f172a"/>
    <circle cx="100" cy="160" r="13" fill="#94a3b8"/>
    <circle cx="300" cy="160" r="32" fill="#0f172a"/>
    <circle cx="300" cy="160" r="13" fill="#94a3b8"/>
    <circle cx="360" cy="115" r="8" fill="#fef3c7"/>
  </g>
  <text x="600" y="80" font-family="Poppins, system-ui, sans-serif" font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle">ZoomWheels</text>
</svg>
